<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earthquake & Weather Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🌍 <span>Earthquake</span> & Weather Dashboard</h1>
    <span id="status-bar">Loading…</span>
  </header>
  <div class="main">
    <div id="map"></div>
    <aside class="sidebar">
      <div id="detail-panel" class="sidebar-section"></div>
      <div id="weather-panel" class="sidebar-section"></div>
      <div class="sidebar-section">
        <h3>Recent Earthquakes</h3>
      </div>
      <div id="earthquake-list"></div>
    </aside>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
