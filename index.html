<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earthquake & Weather Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="dashboard">
    <aside id="sidebar">
      <h1>🌍 EQ Dashboard</h1>
      <div id="filters"></div>
      <div id="eq-detail" class="hidden"></div>
      <div id="earthquake-list">
        <h2>Recent Earthquakes <span id="eq-count"></span></h2>
        <ul id="eq-list"></ul>
      </div>
      <div id="weather-panel" class="hidden"></div>
      <div id="stats-panel" class="hidden"></div>
    </aside>
    <main>
      <div id="map"></div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
